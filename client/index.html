    <!-- Structured Data: FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Community Manager OS?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Community Manager OS is an AI-powered prompt library with 10,000+ prompts designed specifically for community managers. It helps boost engagement, save time, and grow communities across Discord, Slack, WhatsApp, and more."
          }
        },
        {
          "@type": "Question",
          "name": "How many prompts are available?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We offer 10,000+ AI prompts across 10 different platforms (Discord, Slack, WhatsApp, Twitter, LinkedIn, Telegram, Twitch, Reddit, Facebook, and Email), each customizable for your community's tone and situation."
          }
        },
        {
          "@type": "Question",
          "name": "Can I customize the prompts?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! All prompts are fully customizable. You can filter by platform, category, tone, and situation to find the perfect prompt for your needs, then copy and adapt it for your community."
          }
        },
        {
          "@type": "Question",
          "name": "Is Community Manager OS free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, the Community Manager OS prompt library is completely free to use. Browse, search, and copy prompts at no cost."
          }
        }
      ]
    }
